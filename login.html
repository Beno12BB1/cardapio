<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Cardápio Digital</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #9a3412 0%, #c2410c 25%, #ea580c 60%, #f97316 100%);
    }
    .logo-emoji {
      display: inline-block;
      filter: drop-shadow(0 0 30px rgba(254, 215, 170, 0.8));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-12px) rotate(3deg); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="text-8xl mb-5 logo-emoji">🍕</div>
      <h1 class="text-4xl font-bold text-white" style="text-shadow: 0 2px 16px rgba(0,0,0,0.4)">
        Cardápio Digital
      </h1>
      <p class="text-orange-200 mt-2 text-base">Sistema de gestão de restaurante</p>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8">
      <!-- Abas -->
      <div class="flex border-b border-slate-200 dark:border-slate-700 mb-6">
        <button id="aba-login" onclick="trocarAba('login')"
          class="flex-1 py-2.5 text-sm font-semibold border-b-2 border-orange-500 text-orange-600 dark:text-orange-400 transition-colors">
          Entrar
        </button>
        <button id="aba-cadastro" onclick="trocarAba('cadastro')"
          class="flex-1 py-2.5 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
          Cadastrar-se
        </button>
      </div>

      <!-- Login -->
      <form id="form-login" class="space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">E-mail</label>
          <input id="login-email" type="email" placeholder="seuemail@exemplo.com" class="input-field" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Senha</label>
          <input id="login-senha" type="password" placeholder="••••••••" class="input-field" required>
        </div>
        <button type="submit" id="btn-login" class="btn-primary w-full justify-center py-3 text-base">
          Entrar
        </button>
      </form>

      <!-- Cadastro -->
      <form id="form-cadastro" class="space-y-4 hidden" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">E-mail</label>
          <input id="cad-email" type="email" placeholder="seuemail@exemplo.com" class="input-field" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Senha</label>
          <input id="cad-senha" type="password" placeholder="Mínimo 6 caracteres" class="input-field" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Confirmar senha</label>
          <input id="cad-confirma" type="password" placeholder="Repita a senha" class="input-field" required>
        </div>
        <button type="submit" id="btn-cadastro" class="btn-primary w-full justify-center py-3 text-base">
          Criar conta
        </button>
      </form>
    </div>

    <p class="text-center text-orange-200/60 text-xs mt-6">Cardápio Digital © 2025</p>
  </div>

  <script type="module" src="/js/login.js"></script>
  <script>
    function trocarAba(aba) {
      const isLogin = aba === 'login'
      document.getElementById('form-login').classList.toggle('hidden', !isLogin)
      document.getElementById('form-cadastro').classList.toggle('hidden', isLogin)
      document.getElementById('aba-login').className =
        `flex-1 py-2.5 text-sm font-semibold border-b-2 transition-colors ${
          isLogin ? 'border-orange-500 text-orange-600 dark:text-orange-400'
                  : 'border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`
      document.getElementById('aba-cadastro').className =
        `flex-1 py-2.5 text-sm font-semibold border-b-2 transition-colors ${
          !isLogin ? 'border-orange-500 text-orange-600 dark:text-orange-400'
                   : 'border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`
    }
  </script>
</body>
</html>
