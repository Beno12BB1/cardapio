<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <style>body{visibility:hidden}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — Cardápio Digital</title>
  <script type="module" crossorigin src="/cardapio/assets/categorias-g6qaPR_4.js"></script>
  <link rel="modulepreload" crossorigin href="/cardapio/assets/auth-BWDIw5O6.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/sweetalert2.esm.all-8-IS4QHV.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/header-Dw_q0Stu.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/dropdown-bibIyZlW.js">
  <link rel="stylesheet" crossorigin href="/cardapio/assets/sweetalert2.esm-DHyunGrQ.css">
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header"></div>
    <main class="flex-1 overflow-y-auto p-6 space-y-4">

      <!-- Filtros e botão novo -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <form id="form-busca" class="flex flex-wrap gap-2">
          <input id="input-busca" type="text" placeholder="Buscar categoria..."
            class="input-field max-w-xs">
          <select id="filtro-ativo" class="input-field w-auto">
            <option value="">Todas</option>
            <option value="true">Ativas</option>
            <option value="false">Inativas</option>
          </select>
          <button type="submit" class="btn-secondary px-3">
            <span data-heroicon="magnifying-glass"></span>
          </button>
          <button type="button" id="btn-limpar" class="btn-secondary px-3">Limpar</button>
        </form>
        <button id="btn-nova" class="btn-primary shrink-0">
          <span data-heroicon="plus"></span> Nova Categoria
        </button>
      </div>

      <!-- Tabela -->
      <div class="card p-0 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="table-header">
              <tr>
                <th class="px-4 py-3 text-left cursor-pointer select-none hover:bg-slate-100 dark:hover:bg-slate-600/60 transition-colors" onclick="window._sortBy('nome')">Nome<span data-sort="nome" class="text-slate-400 text-xs"> ↕</span></th>
                <th class="px-4 py-3 text-left hidden sm:table-cell">Descrição</th>
                <th class="px-4 py-3 text-left hidden sm:table-cell">Situação</th>
                <th class="px-4 py-3 text-right hidden sm:table-cell">Ações</th>
                <th class="px-2 py-3 sm:hidden"></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <!-- Paginação -->
        <div class="flex items-center justify-between px-4 py-3 border-t border-slate-100 dark:border-slate-700">
          <button id="btn-anterior" class="btn-secondary text-xs px-3 py-1.5">
            <span data-heroicon="chevron-left"></span> Anterior
          </button>
          <span id="info-pagina" class="text-sm text-slate-500 dark:text-slate-400">
            Página 1 de 1
          </span>
          <button id="btn-proxima" class="btn-secondary text-xs px-3 py-1.5">
            Próxima <span data-heroicon="chevron-right"></span>
          </button>
        </div>
      </div>

      <footer class="pt-4 border-t border-slate-200 dark:border-slate-700 text-center text-xs text-slate-400 dark:text-slate-500 no-print">
        Cardápio Digital © 2025 — Fatec Itu
      </footer>
    </main>
  </div>
</div>
<script>if(!localStorage.getItem('sb-wvjwwstxvhzywqsbgvjx-auth-token'))window.location.href='/cardapio/login.html'</script>
</body>
</html>
