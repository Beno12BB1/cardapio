<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <style>body{visibility:hidden}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver Cardápio — Cardápio Digital</title>
  <script type="module" crossorigin src="/cardapio/assets/cardapio-B9l_AYm-.js"></script>
  <link rel="modulepreload" crossorigin href="/cardapio/assets/auth-BWDIw5O6.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/sweetalert2.esm.all-DOeT8Qg5.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/header-BE-Yf_-c.js">
  <link rel="stylesheet" crossorigin href="/cardapio/assets/sweetalert2.esm-B0h9owx8.css">
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header"></div>
    <main class="flex-1 overflow-y-auto p-6 space-y-6">

      <!-- Contador animado + preço médio -->
      <div class="card p-5 flex items-center justify-center gap-8 no-print">
        <div class="text-center">
          <div class="text-6xl font-bold text-orange-500 tabular-nums leading-none" id="contador-disponiveis">0</div>
          <div class="text-sm text-slate-500 dark:text-slate-400 mt-2">pratos disponíveis</div>
        </div>
        <div class="w-px h-14 bg-slate-200 dark:bg-slate-700 shrink-0"></div>
        <div class="text-center">
          <div class="text-3xl font-bold text-slate-700 dark:text-slate-200 tabular-nums" id="preco-medio">—</div>
          <div class="text-sm text-slate-500 dark:text-slate-400 mt-2">preço médio</div>
        </div>
      </div>

      <!-- Busca e filtro -->
      <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between no-print">
        <div class="flex gap-2">
          <input id="input-busca" type="text" placeholder="Buscar prato..."
            class="input-field max-w-xs">
          <button id="btn-buscar" class="btn-secondary px-3">
            <span data-heroicon="magnifying-glass"></span>
          </button>
          <button id="btn-limpar" class="btn-secondary px-3">Limpar</button>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
            <span data-heroicon="book-open" class="text-orange-500"></span>
            <span id="total-pratos">Carregando...</span>
          </div>
          <button id="btn-imprimir" class="btn-secondary px-3 py-2 text-sm">
            🖨️ PDF
          </button>
        </div>
      </div>

      <!-- Filtro por categoria (pills) -->
      <div id="pills-categorias" class="flex flex-wrap gap-2 no-print"></div>

      <!-- Conteúdo do cardápio -->
      <div id="conteudo-cardapio" class="space-y-8"></div>

      <footer class="pt-4 border-t border-slate-200 dark:border-slate-700 text-center text-xs text-slate-400 dark:text-slate-500 no-print">
        Cardápio Digital © 2025 — Fatec Itu
      </footer>
    </main>
  </div>
</div>
<script>if(!localStorage.getItem('sb-wvjwwstxvhzywqsbgvjx-auth-token'))window.location.href='/cardapio/login.html'</script>
</body>
</html>
