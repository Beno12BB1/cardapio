<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <style>body{visibility:hidden}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Cardápio Digital</title>
  <script type="module" crossorigin src="/cardapio/assets/dashboard-DRZgNmmf.js"></script>
  <link rel="modulepreload" crossorigin href="/cardapio/assets/auth-BWDIw5O6.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/sweetalert2.esm.all-DlTzfnTl.js">
  <link rel="modulepreload" crossorigin href="/cardapio/assets/header-25cIYKJM.js">
  <link rel="stylesheet" crossorigin href="/cardapio/assets/sweetalert2.esm-D8rUYXHE.css">
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="header"></div>
    <main class="flex-1 overflow-y-auto p-6 space-y-6">

      <!-- Boas-vindas -->
      <div id="boas-vindas"></div>

      <!-- Cards de resumo -->
      <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
        <div class="card animate-pulse h-24"></div>
        <div class="card animate-pulse h-24"></div>
        <div class="card animate-pulse h-24"></div>
        <div class="card animate-pulse h-24"></div>
      </div>

      <!-- Cards de estatísticas -->
      <div id="cards-stats" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
        <div class="card animate-pulse h-20"></div>
        <div class="card animate-pulse h-20"></div>
        <div class="card animate-pulse h-20"></div>
        <div class="card animate-pulse h-20"></div>
      </div>

      <!-- Pratos recentes -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <div class="card">
          <h2 class="text-base font-semibold mb-4">Últimos Pratos Cadastrados</h2>
          <div class="space-y-3" id="lista-pratos-recentes">
            ${Array(3).fill('<div class="animate-pulse h-12 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>').join('')}
          </div>
        </div>

        <div class="card">
          <h2 class="text-base font-semibold mb-4">Categorias Ativas</h2>
          <div class="space-y-2" id="lista-categorias">
            ${Array(3).fill('<div class="animate-pulse h-8 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>').join('')}
          </div>
        </div>

      </div>

      <!-- Gráfico de pratos por categoria -->
      <div class="card">
        <h2 class="text-base font-semibold mb-4">Pratos por Categoria</h2>
        <div id="grafico-categorias" class="space-y-3">
          <p class="text-slate-400 text-sm animate-pulse">Carregando...</p>
        </div>
      </div>

      <footer class="pt-4 border-t border-slate-200 dark:border-slate-700 text-center text-xs text-slate-400 dark:text-slate-500 no-print">
        Cardápio Digital © 2025 — Fatec Itu
      </footer>
    </main>
  </div>
</div>
<script>if(!localStorage.getItem('sb-wvjwwstxvhzywqsbgvjx-auth-token'))window.location.href='/cardapio/login.html'</script>
</body>
</html>
